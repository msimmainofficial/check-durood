<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Mission Syedi Ikram E Millat Official Durood Competition</title>

<style>

body{
font-family:Arial,sans-serif;
background:#241006;
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
}


.card{
background:linear-gradient(145deg,#ffd700,#ffb300);
padding:30px;
border-radius:22px;
width:90%;
max-width:420px;
box-shadow:0 15px 40px rgba(0,0,0,.7);
border:3px solid #fff1a8;
}


.logo{
display:block;
margin:auto;
width:90px;
height:90px;
object-fit:contain;
margin-bottom:15px;
}


h2{
text-align:center;
color:#3b1b08;
font-size:26px;
line-height:1.3;
margin:10px 0 20px;
}


input{
width:100%;
padding:14px;
margin-top:12px;
border-radius:12px;
box-sizing:border-box;
border:2px solid #3b1b08;
font-size:16px;
color:#3b1b08;
}


button{
width:100%;
padding:14px;
margin-top:16px;
border-radius:12px;
border:none;
background:#3b1b08;
color:white;
font-size:17px;
font-weight:bold;
}


#result{
margin-top:20px;
color:#3b1b08;
font-size:18px;
font-weight:bold;
line-height:1.7;
text-align:center;
}

</style>

</head>

<body>

<div class="card">


<!-- LOGO YAHAN DIKHEGA -->
<img src="20260509_172712.png" class="logo">


<h2>
MISSION SYEDI IKRAM E MILLAT<br>
DUROOD COMPETITION
</h2>


<input id="phone" placeholder="Enter Mobile Number">


<button onclick="check()">CHECK TOTAL</button>


<div id="result"></div>


</div>



<script>

const api="https://script.google.com/macros/s/AKfycbxzE8ax6GJjc8jXZRtS1KM3_wB_P5zbPXD-KPmfWRnA2BbWaBNqc9I3aoJfTKc_Wh7iFg/exec";


function check(){

let phone=document.getElementById("phone").value;


fetch(api+"?phone="+encodeURIComponent(phone))

.then(r=>r.json())

.then(d=>{

document.getElementById("result").innerHTML=
"Name: "+d.name+
"<br>Total Durood: "+d.total+
"<br>Last Entry: "+d.lastEntry;

});

}

</script>


</body>
</html>
