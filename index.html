<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Check Mission Syedi Ikram E Milat Durood Total</title>
<style>
body{font-family:Arial,sans-serif;background:00072D;margin:0;display:flex;justify-content:center;align-items:center;height:100vh}
.card{background:#3d251e;padding:24px;border-radius:16px;width:90%;max-width:420px;box-shadow:0 10px 30px rgba(0,0,0,.3)}
input,button{width:100%;padding:12px;margin-top:12px;border-radius:8px;box-sizing:border-box}
input{border:2px solid #00072D}
button{background:#5b3e31;color:#FFD700;border:none}
</style>
</head>
<body>
<div class="card">
<h2> DUROOD COMPETITION<br>MISSION SYEDI IKRAM E MILLAT</h2>
<p style="text-align:center;color:#00072D;font-weight:bold;">
Check Your Total Durood 
</p>
<input id="phone" placeholder="Enter Mobile Number">
<button onclick="check()">Check Total</button>
<div id="result" style="margin-top:18px"></div>
</div>
<script>
const api="https://script.google.com/macros/s/AKfycbx-6iXRu0iMX4sNE7qFCtRTFGKo0iQ7lA9n9rgYUnzU8Mp0x3gb43fIZbkd9jnmPxkwYQ/exec";
function check(){
fetch(api+"?phone="+encodeURIComponent(document.getElementById('phone').value))
.then(r=>r.json())
.then(d=>{
document.getElementById('result').innerHTML=
`<b>Name:</b> ${d.name}<br><b>Total Durood:</b> ${d.total}<br><b>Last Entry:</b> ${d.lastEntry}`;
});
}
</script>
</body>
</html>
