<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Mission Syedi Ikram E Millat Durood Competition</title>

<style>

body{
font-family:Arial,sans-serif;
background:#2b160b;
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
}

.card{
background:#d4af37;
padding:28px;
border-radius:20px;
width:90%;
max-width:420px;
box-shadow:0 10px 30px rgba(0,0,0,.5);
}

h2{
text-align:center;
color:#3b1f0b;
font-size:26px;
margin-bottom:20px;
}

input{
width:100%;
padding:14px;
margin-top:12px;
border-radius:10px;
box-sizing:border-box;
border:2px solid #3b1f0b;
font-size:16px;
color:#3b1f0b;
background:white;
}

button{
width:100%;
padding:14px;
margin-top:15px;
border-radius:10px;
border:none;
background:#3b1f0b;
color:white;
font-size:17px;
cursor:pointer;
}

button:hover{
opacity:.9;
}

#result{
margin-top:20px;
color:#3b1f0b;
font-size:18px;
line-height:1.6;
font-weight:bold;
}

</style>

</head>

<body>

<div class="card">

<h2>
Mission Syedi Ikram E Millat<br>
Durood Competition
</h2>

<input id="phone" placeholder="Enter Mobile Number">

<button onclick="check()">Check Total</button>

<div id="result"></div>

</div>


<script>

const api="https://script.google.com/macros/s/AKfycbxzE8ax6GJjc8jXZRtS1KM3_wB_P5zbPXD-KPmfWRnA2BbWaBNqc9I3aoJfTKc_Wh7iFg/exec";


function check(){

let phone=document.getElementById("phone").value;

fetch(api+"?phone="+encodeURIComponent(phone))

.then(response=>response.json())

.then(data=>{

document.getElementById("result").innerHTML=

"Name: "+data.name+
"<br>Total Durood: "+data.total+
"<br>Last Entry: "+data.lastEntry;

})

.catch(error=>{

document.getElementById("result").innerHTML="Error Loading Data";

});

}

</script>

</body>
</html>
